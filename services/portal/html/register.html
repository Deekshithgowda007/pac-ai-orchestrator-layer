<html>

<head>
<title>Hospital Registration</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d6efd,#6ea8fe);
}

.card{
background:white;
padding:40px;
border-radius:12px;
width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#0d6efd;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

input:focus{
outline:none;
border-color:#0d6efd;
box-shadow:0 0 5px rgba(13,110,253,0.4);
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#0d6efd;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#0b5ed7;
}

a{
color:#0d6efd;
text-decoration:none;
font-weight:600;
}

</style>

</head>

<body>

<div class="card">

<h2>Hospital Registration</h2>

<input id="name" placeholder="Hospital Name">
<input id="city" placeholder="City">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="phone" placeholder="Phone">
<input id="modalities" placeholder="Modalities (CT,MRI,XRAY)">

<button onclick="register()">Register</button>

<br><br>

<a href="login.html">Already registered? Login</a>

</div>

<script>

async function register(){

let data={
name:document.getElementById("name").value,
city:document.getElementById("city").value,
email:document.getElementById("email").value,
password:document.getElementById("password").value,
phone:document.getElementById("phone").value,
modalities:document.getElementById("modalities").value
}

let res=await fetch("http://localhost:8002/onboard",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

let result=await res.json()

alert("Tenant ID: "+result.hospital_id)

window.location="login.html"

}

</script>

</body>
</html>
