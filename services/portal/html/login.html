<html>

<head>
<title>Hospital Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d6efd,#6ea8fe);
}

.card{
background:white;
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#0d6efd;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#0d6efd;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#0b5ed7;
}

a{
color:#0d6efd;
text-decoration:none;
font-weight:600;
}

</style>

</head>

<body>

<div class="card">

<h2>Hospital Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<br><br>

<a href="register.html">New hospital? Register</a>

</div>

<script>

async function login(){

let data={
email:document.getElementById("email").value,
password:document.getElementById("password").value
}

let res=await fetch("http://localhost:8002/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

let result=await res.json()

if(result.hospital_id){

localStorage.setItem("hospital_id",result.hospital_id)

window.location="dashboard.html"

}else{

alert("Invalid login")

}

}

</script>

</body>
</html>
