version: "3.9"

services:

  ai_inference:
    build: ./services/ai_inference
    environment:
      DCM4CHEE_BASE_URL: http://dcm4chee-arc:8080/dcm4chee-arc
      OPENAI_API_KEY: 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
      HF_API_KEY: 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
      AI_WORKERS: 2
    volumes:
    - dicom_data:/data/dicom
    ports:
      - "8001:8001"
    networks: [pacnet]
    

  orchestrator:
    build: ./services/orchestrator
    environment:
      AI_HOST: ai_inference
      AI_PORT: 8001
      SUPABASE_URL: https://eposvgsqtvwmqtlrwpuw.supabase.co
      SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      PACS_QIDO_URL: http://dcm4chee-arc:8080/dcm4chee-arc/aets/DCM4CHEE/rs
      PACS_WADO_URL: http://dcm4chee-arc:8080/dcm4chee-arc/aets/DCM4CHEE/wado
      PACS_STOW_URL: http://dcm4chee-arc:8080/dcm4chee-arc/aets/DCM4CHEE/rs
      ENGINE_INSTANCES_CONFIG: default_engine:ai_inference:8001
      AI_FALLBACK_ENGINES: default_engine
      OPENAI_API_KEY: sk-proj-ePv7w7mG5ObqjrY...
      OPENAI_MODEL: gpt-4o
    ports:
      - "8010:8000"
    depends_on:
      - ai_inference
      - dcm4chee-arc
      - prometheus
    networks: [pacnet]

  postgres:
    image: dcm4che/postgres-dcm4chee:11.22-34
    # volumes:
    # - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: pacsdb
      POSTGRES_USER: pacs
      POSTGRES_PASSWORD: pacs
    networks: [pacnet]

  ldap:
    image: dcm4che/slapd-dcm4chee:2.6.8-34.1
    environment:
      LDAP_ROOTPASS: secret
    networks: [pacnet]

  dcm4chee-arc:
    image: dcm4che/dcm4chee-arc-psql:5.34.0
    # volumes:
    # - dcm4chee-data:/opt/wildfly/standalone/data
    ports:
      - "8090:8080"
      - "11112:11112"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: pacsdb
      POSTGRES_USER: pacs
      POSTGRES_PASSWORD: pacs
      LDAP_URL: ldap://ldap:389
      LDAP_BASE_DN: dc=dcm4che,dc=org
      LDAP_ROOTPASS: secret
      WILDFLY_CHOWN: /opt/wildfly/standalone
    depends_on:
      - postgres
      - ldap
    networks: [pacnet]

  ohif:
    image: ohif/app:latest
    ports:
      - "3001:80"
    environment:
      OHIF_DICOMWEB__SERVERS__0__NAME: dcm4chee
      OHIF_DICOMWEB__SERVERS__0__WADO_URI_ROOT: http://dcm4chee-arc:8080/dcm4chee-arc/aets/DCM4CHEE/wado
      OHIF_DICOMWEB__SERVERS__0__WADO_RS_ROOT: http://dcm4chee-arc:8080/dcm4chee-arc/aets/DCM4CHEE/rs
      OHIF_DICOMWEB__SERVERS__0__QIDO_RS_ROOT: http://dcm4chee-arc:8080/dcm4chee-arc/aets/DCM4CHEE/rs
      OHIF_DICOMWEB__SERVERS__0__STOW_RS_ROOT: http://dcm4chee-arc:8080/dcm4chee-arc/aets/DCM4CHEE/rs
    networks: [pacnet]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks: [pacnet]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # INTERNAL + EXTERNAL LISTENERS
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://172.16.16.39:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # IMPORTANT FOR LARGE MESSAGES
      KAFKA_MESSAGE_MAX_BYTES: 20000000
      KAFKA_REPLICA_FETCH_MAX_BYTES: 20000000

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 40s
      timeout: 30s
      retries: 10

    networks: [pacnet]

  # kafka_orchestrator:
  #   build: ./services/orchestrator
  #   command: ["python", "-u", "kafka_worker.py"]
  #   environment:
  #     KAFKA_BROKERS: kafka:29092
  #     KAFKA_TOPIC: study.ingested
  #     SUPABASE_URL: https://eposvgsqtvwmqtlrwpuw.supabase.co
  #     SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwb3N2Z3NxdHZ3bXF0bHJ3cHV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI0NjgwNzgsImV4cCI6MjA2ODA0NDA3OH0.pdHXlAJFjcE1n4HoFSVWWOBG1Yhmqr_jXW0wqSdyhXg
  #   depends_on:
  #     kafka:
  #       condition: service_healthy
  #   networks: [pacnet]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./services/prometheus/Prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [pacnet]

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ai.json
    networks: [pacnet]

  pacs_fetcher:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile.pacs_fetcher
    container_name: pacs_fetcher
    environment:
      DCM4CHEE_BASE: http://dcm4chee-arc:8080/dcm4chee-arc/aets/DCM4CHEE/rs
      DCM4CHEE_BASE_URL: http://dcm4chee-arc:8080/dcm4chee-arc
      KAFKA_BROKERS: kafka:29092
    depends_on:
    - kafka
    - dcm4chee-arc
    volumes:
      - dicom_data:/data/dicom
    restart: always
    networks: [pacnet]

  kafka_router:
   build: ./services/orchestrator
   command: ["python", "-u", "kafka_to_queue.py"]
   depends_on:
    kafka:
      condition: service_healthy
   environment:
    KAFKA_BROKERS: kafka:29092
    KAFKA_TOPIC: study.ingested
    KAFKA_GROUP: orchestrator-router-v3
    SUPABASE_URL: https://eposvgsqtvwmqtlrwpuw.supabase.co
    SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwb3N2Z3NxdHZ3bXF0bHJ3cHV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI0NjgwNzgsImV4cCI6MjA2ODA0NDA3OH0.pdHXlAJFjcE1n4HoFSVWWOBG1Yhmqr_jXW0wqSdyhXg
   networks: [pacnet]

  ai_worker:
   build:
    context: ./services/ai_inference
    dockerfile: Dockerfile
   container_name: ai_worker
   depends_on:
    - dcm4chee-arc
   environment:
    SUPABASE_URL: https://eposvgsqtvwmqtlrwpuw.supabase.co
    SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwb3N2Z3NxdHZ3bXF0bHJ3cHV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI0NjgwNzgsImV4cCI6MjA2ODA0NDA3OH0.pdHXlAJFjcE1n4HoFSVWWOBG1Yhmqr_jXW0wqSdyhXg
    DCM4CHEE_WADO: http://dcm4chee-arc:8080/dcm4chee-arc/aets/DCM4CHEE/rs
    DCM4CHEE_BASE_URL: http://dcm4chee-arc:8080/dcm4chee-arc
   volumes:
    - dicom_data:/data/dicom
   restart: unless-stopped
   networks: [pacnet]
  
  
volumes:
  #  pgdata:
   dicom_data:

networks:
    pacnet:
     driver: bridge
